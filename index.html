<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cute Quiz</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap');

body {
    font-family:'Caveat',cursive;
    background:#1a0f0b;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.paper {
    background:#2c1810;
    padding:40px;
    border-radius:15px;
    border:3px solid #8b0000;
    width:90%;
    max-width:600px;
    position:relative;
}

.question {
    font-size:2em;
    color:#d2691e;
    text-align:center;
}

.buttons {
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:20px;
    height:120px;
    position:relative;
}

.btn {
    font-size:1.5em;
    padding:12px 25px;
    border:none;
    border-radius:25px;
    cursor:pointer;
    background:#8b0000;
    color:white;
}

.btn-no {
    position:absolute;
    background:#555;
}

.letter {
    color:#f4e4bc;
    font-size:1.5em;
    white-space:pre-line;
    display:none;
    min-height:200px;
}

.hidden { display:none; }
</style>
</head>

<body>

<!-- 🎵 BACKGROUND MUSIC -->
<audio id="bgMusic" loop>
    <source src="glue-song.mp3" type="audio/mpeg">
</audio>

<div class="paper">

<div id="q1">
    <div class="question">are you sure you want to continue?</div>
    <div class="buttons">
        <button class="btn" onclick="nextQ(1)">Yes</button>
        <button class="btn btn-no" onmouseenter="moveButton(this)">No</button>
    </div>
</div>

<div id="q2" class="hidden">
    <div class="question">sure na dyan? mahaba to</div>
    <div class="buttons">
        <button class="btn" onclick="nextQ(2)">Yes</button>
        <button class="btn btn-no" onmouseenter="moveButton(this)">No</button>
    </div>
</div>

<div id="q3" class="hidden">
    <div class="question">last na, are. you. sure?</div>
    <div class="buttons">
        <button class="btn" onclick="startExperience()">Yes</button>
        <button class="btn btn-no" onmouseenter="moveButton(this)">No</button>
    </div>
</div>

<div id="poem" class="letter"></div>

</div>

<script>

// QUESTIONS
function nextQ(n){
    document.getElementById("q"+n).classList.add("hidden");
    document.getElementById("q"+(n+1)).classList.remove("hidden");
}

// START EVERYTHING
function startExperience(){
    document.getElementById("q3").classList.add("hidden");

    // 🎵 start music (needs user interaction)
    const music = document.getElementById("bgMusic");
    music.play().catch(()=>{});

    // ✨ start typing
    const text = `Hii Nyela,

I told you I moved on.

I didn't.

It's been eleven months.

And somehow,
I'm still here.`;

    typeWriter(text);
}

// ✨ TYPEWRITER EFFECT
function typeWriter(text){
    const el = document.getElementById("poem");
    el.style.display = "block";
    let i = 0;

    function typing(){
        if(i < text.length){
            el.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, 35); // speed here
        }
    }

    typing();
}

// 😈 RUNAWAY BUTTON
function moveButton(btn){
    const parent = btn.parentElement;

    const maxX = parent.clientWidth - btn.offsetWidth;
    const maxY = parent.clientHeight - btn.offsetHeight;

    btn.style.left = Math.random()*maxX + "px";
    btn.style.top = Math.random()*maxY + "px";
}

</script>

</body>
</html>
