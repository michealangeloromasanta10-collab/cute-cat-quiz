<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cute Quiz</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap');

body {
    font-family:'Caveat',cursive;
    background:#1a0f0b;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.paper {
    background:#2c1810;
    padding:40px;
    border-radius:15px;
    border:3px solid #8b0000;
    width:90%;
    max-width:650px;
    position:relative;
}

.question {
    font-size:2em;
    color:#d2691e;
    text-align:center;
}

.buttons {
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:20px;
    height:120px;
    position:relative;
}

.btn {
    font-size:1.5em;
    padding:12px 25px;
    border:none;
    border-radius:25px;
    cursor:pointer;
    background:#8b0000;
    color:white;
}

.btn-no {
    position:absolute;
    background:#555;
}

.letter {
    color:#f4e4bc;
    font-size:1.5em;
    white-space:pre-line;
    min-height:200px;
}

.hidden { display:none; }
</style>
</head>

<body>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" loop>
    <source src="glue-song.mp3" type="audio/mpeg">
</audio>

<div class="paper">

<div id="q1">
    <div class="question">are you sure you want to continue?</div>
    <div class="buttons">
        <button class="btn" onclick="nextQ(1)">Yes</button>
        <button class="btn btn-no" onmouseenter="moveButton(this)">No</button>
    </div>
</div>

<div id="q2" class="hidden">
    <div class="question">sure na dyan? mahaba to</div>
    <div class="buttons">
        <button class="btn" onclick="nextQ(2)">Yes</button>
        <button class="btn btn-no" onmouseenter="moveButton(this)">No</button>
    </div>
</div>

<div id="q3" class="hidden">
    <div class="question">last na, are. you. sure?</div>
    <div class="buttons">
        <button class="btn" onclick="startExperience()">Yes</button>
        <button class="btn btn-no" onmouseenter="moveButton(this)">No</button>
    </div>
</div>

<div id="poem" class="letter hidden"></div>

</div>

<script>

// QUESTIONS
function nextQ(n){
    document.getElementById("q"+n).classList.add("hidden");
    document.getElementById("q"+(n+1)).classList.remove("hidden");
}

// START
function startExperience(){
    document.getElementById("q3").classList.add("hidden");
    document.getElementById("poem").classList.remove("hidden");

    document.getElementById("bgMusic").play().catch(()=>{});

    currentPart = 0;
    showNextPart();
}

// POEM PARTS (FULL)
let poemParts = [

`Hii Nyela,

I need to tell you something
not to change anything
just because I'm tired of pretending

I told you I moved on

I didn't

it's been eleven months
of carrying this quietly
of smiling like it faded
when it never did`,

`I remember when I told you before
and you said you couldn't

not because there was nothing
but because you were closed

and I understood that

but understanding it
didn't make my feelings disappear`,

`so I stayed

as your friend

and somewhere along the way
I learned how to hide it

how to make it look like I was okay

but I wasn't`,

`I'm still here

still feeling it
still hoping in ways I don't say out loud

how your name lighting up my phone
can change my whole mood

how I still get excited
over the smallest message from you`,

`how I look for you
in every crowded place

and somehow
you're always the one I find

how I notice everything
the way you laugh
the way you talk`,

`how I make up little scenarios

of us

like holding your hand
like being something more

and it's exhausting
to feel this much
and act like it's nothing`,

`I don't want to lose you

what we have right now
means everything to me

so if nothing ever changes

I'll stay

as your friend`,

`but I also can't lie

and say I don't wonder

about us

about what we could've been

or what we could still be`,

`not loudly

not in a way that asks anything from you

just quietly

that maybe someday

you'd let yourself wonder too`
];

let currentPart = 0;

// SHOW PART
function showNextPart(){
    const el = document.getElementById("poem");
    el.innerHTML = "";

    typeWriter(poemParts[currentPart], () => {
        showContinueButton();
    });
}

// TYPEWRITER
function typeWriter(text, callback){
    const el = document.getElementById("poem");
    let i = 0;

    function typing(){
        if(i < text.length){
            el.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, 25);
        } else {
            callback();
        }
    }

    typing();
}

// CONTINUE BUTTON
function showContinueButton(){
    const btn = document.createElement("button");
    btn.innerText = "continue...";
    btn.className = "btn";
    btn.style.marginTop = "20px";

    btn.onclick = () => {
        btn.remove();
        currentPart++;

        if(currentPart < poemParts.length){
            showNextPart();
        } else {
            showFinal();
        }
    };

    document.getElementById("poem").appendChild(document.createElement("br"));
    document.getElementById("poem").appendChild(btn);
}

// FINAL
function showFinal(){
    const el = document.getElementById("poem");
    el.innerHTML += `

I value our friendship.

but I hope…
even just once

you think about us again.`;
}

// RUNAWAY BUTTON
function moveButton(btn){
    const parent = btn.parentElement;

    const maxX = parent.clientWidth - btn.offsetWidth;
    const maxY = parent.clientHeight - btn.offsetHeight;

    btn.style.left = Math.random()*maxX + "px";
    btn.style.top = Math.random()*maxY + "px";
}

</script>

</body>
</html>
